<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#eae8e0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <!-- Receipt outline -->
  <rect x="290" y="40" width="220" height="320" fill="white" stroke="#d0d0d0" stroke-width="1" rx="4"
        filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>

  <!-- Zigzag top -->
  <path d="M290,44 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4" fill="none" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Zigzag bottom -->
  <path d="M290,356 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4 l5,-4 l5,4" fill="none" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Receipt header -->
  <text x="400" y="88" font-family="'Courier New',monospace" font-size="18" font-weight="bold" fill="#1a1a1a" text-anchor="middle" letter-spacing="6">COSTEA</text>
  <text x="400" y="108" font-family="'Courier New',monospace" font-size="9" fill="#8a8a8a" text-anchor="middle" letter-spacing="3">AGENT COST RECEIPT</text>

  <!-- Dashed line -->
  <line x1="310" y1="122" x2="490" y2="122" stroke="#d0d0d0" stroke-dasharray="4,3"/>

  <!-- Task -->
  <text x="310" y="142" font-family="'Courier New',monospace" font-size="8" fill="#8a8a8a">TASK</text>
  <text x="310" y="156" font-family="'Courier New',monospace" font-size="10" fill="#1a1a1a">Refactor the auth module</text>

  <line x1="310" y1="168" x2="490" y2="168" stroke="#d0d0d0" stroke-dasharray="4,3"/>

  <!-- Token rows -->
  <text x="310" y="186" font-family="'Courier New',monospace" font-size="9" fill="#8a8a8a">Input tokens</text>
  <text x="490" y="186" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">12,400</text>

  <text x="310" y="200" font-family="'Courier New',monospace" font-size="9" fill="#8a8a8a">Output tokens</text>
  <text x="490" y="200" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">5,800</text>

  <text x="310" y="214" font-family="'Courier New',monospace" font-size="9" fill="#8a8a8a">Tool calls</text>
  <text x="490" y="214" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">14</text>

  <line x1="310" y1="226" x2="490" y2="226" stroke="#d0d0d0" stroke-dasharray="4,3"/>

  <!-- Provider estimates -->
  <text x="310" y="244" font-family="'Courier New',monospace" font-size="8" fill="#8a8a8a">PROVIDER ESTIMATES</text>
  <text x="310" y="260" font-family="'Courier New',monospace" font-size="9" fill="#4a4a4a">Claude Sonnet 4</text>
  <text x="490" y="260" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">$0.38</text>
  <text x="310" y="274" font-family="'Courier New',monospace" font-size="9" fill="#4a4a4a">GPT-5.4</text>
  <text x="490" y="274" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">$0.54</text>
  <text x="310" y="288" font-family="'Courier New',monospace" font-size="9" fill="#4a4a4a">Gemini 2.5 Pro</text>
  <text x="490" y="288" font-family="'Courier New',monospace" font-size="9" fill="#1a1a1a" text-anchor="end">$0.29</text>

  <!-- Double line -->
  <line x1="310" y1="300" x2="490" y2="300" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="310" y1="303" x2="490" y2="303" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Total -->
  <text x="310" y="322" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#1a1a1a">ESTIMATED TOTAL</text>
  <text x="490" y="322" font-family="'Courier New',monospace" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="end">$0.38</text>

  <!-- Barcode decorative -->
  <g transform="translate(355,340)">
    <rect x="0" width="3" height="12" fill="#1a1a1a"/><rect x="4" width="1" height="12" fill="#1a1a1a"/>
    <rect x="6" width="2" height="12" fill="#1a1a1a"/><rect x="9" width="1" height="12" fill="#1a1a1a"/>
    <rect x="11" width="3" height="12" fill="#1a1a1a"/><rect x="15" width="2" height="12" fill="#1a1a1a"/>
    <rect x="18" width="1" height="12" fill="#1a1a1a"/><rect x="20" width="1" height="12" fill="#1a1a1a"/>
    <rect x="22" width="3" height="12" fill="#1a1a1a"/><rect x="26" width="1" height="12" fill="#1a1a1a"/>
    <rect x="28" width="2" height="12" fill="#1a1a1a"/><rect x="31" width="3" height="12" fill="#1a1a1a"/>
    <rect x="35" width="1" height="12" fill="#1a1a1a"/><rect x="37" width="2" height="12" fill="#1a1a1a"/>
    <rect x="40" width="1" height="12" fill="#1a1a1a"/><rect x="42" width="1" height="12" fill="#1a1a1a"/>
    <rect x="44" width="3" height="12" fill="#1a1a1a"/><rect x="48" width="2" height="12" fill="#1a1a1a"/>
    <rect x="51" width="1" height="12" fill="#1a1a1a"/><rect x="53" width="3" height="12" fill="#1a1a1a"/>
    <rect x="57" width="1" height="12" fill="#1a1a1a"/><rect x="59" width="2" height="12" fill="#1a1a1a"/>
    <rect x="62" width="1" height="12" fill="#1a1a1a"/><rect x="64" width="3" height="12" fill="#1a1a1a"/>
    <rect x="68" width="2" height="12" fill="#1a1a1a"/><rect x="71" width="1" height="12" fill="#1a1a1a"/>
    <rect x="73" width="1" height="12" fill="#1a1a1a"/><rect x="75" width="2" height="12" fill="#1a1a1a"/>
    <rect x="78" width="3" height="12" fill="#1a1a1a"/><rect x="82" width="1" height="12" fill="#1a1a1a"/>
  </g>

  <!-- Left side text -->
  <text x="80" y="160" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1a1a1a">cost</text>
  <text x="80" y="195" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1a1a1a">prediction</text>
  <text x="80" y="230" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1a1a1a">for ai agents</text>

  <text x="82" y="260" font-family="system-ui,sans-serif" font-size="13" fill="#8a8a8a">Know what you spend</text>
  <text x="82" y="278" font-family="system-ui,sans-serif" font-size="13" fill="#8a8a8a">before you spend it.</text>

  <!-- Right side: small platform logos as text -->
  <text x="560" y="140" font-family="'Courier New',monospace" font-size="10" fill="#b0b0b0">Platforms</text>
  <text x="560" y="160" font-family="'Courier New',monospace" font-size="11" fill="#4a4a4a">Claude Code</text>
  <text x="560" y="176" font-family="'Courier New',monospace" font-size="11" fill="#4a4a4a">Codex CLI</text>
  <text x="560" y="192" font-family="'Courier New',monospace" font-size="11" fill="#4a4a4a">OpenClaw</text>

  <text x="560" y="230" font-family="'Courier New',monospace" font-size="10" fill="#b0b0b0">Skills</text>
  <text x="560" y="250" font-family="'Courier New',monospace" font-size="11" fill="#4a4a4a">/costea</text>
  <text x="560" y="266" font-family="'Courier New',monospace" font-size="11" fill="#4a4a4a">/costeamigo</text>
</svg>
